task:
  name: "whitehouse_trump2_q1"
  description: "Collect all presidential actions from Trump's second term, from inauguration (Jan 20, 2025) through March 31, 2025"
  task_type: "web_scraping"

target:
  topic: "Presidential actions (executive orders, memoranda, proclamations)"
  time_range:
    start: "2025-01-20"
    end: "2025-03-31"
  doc_type: "presidential actions"
  language: "en"

coverage:
  target: 0.90
  mode: "hard"
  dimensions:
    - time
    - type
    - record

quality:
  min_text_length: 100
  required_fields:
    - title
    - full_text
    - date
    - type

budget:
  max_rounds: 8
  max_requests: 3000
  max_runtime_minutes: 120
  model: "claude-opus-4-6"

risk:
  respect_robots_txt: true
  max_requests_per_minute: 30

sources:
  seed_sources:
    - "https://www.whitehouse.gov/presidential-actions/"
  preferred_sources:
    - "whitehouse.gov"
