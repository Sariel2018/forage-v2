# Forage Task Spec: First Proof Q10 (Kolda) — Sonnet model variant
# Same task as first_proof_q10.yaml, only difference is model: sonnet
# For Opus vs Sonnet comparison experiment

task:
  name: "first_proof_q10_sonnet"
  description: |
    Solve Question 10 from the First Proof benchmark (Tammy Kolda).

    Given a d-way tensor T with missing entries, we compute a CP decomposition of rank r
    where some modes are infinite-dimensional and constrained to a Reproducing Kernel
    Hilbert Space (RKHS). The mode-k subproblem requires solving:

      [(Z ⊗ K)^T S S^T (Z ⊗ K) + λ(I_r ⊗ K)] vec(W) = (I_r ⊗ K) vec(B)

    This is a system of size nr × nr. Direct solve costs O(n³r³).

    Explain how an iterative preconditioned conjugate gradient linear solver can be used
    to solve this problem more efficiently. Explain the method and choice of preconditioner.
    Explain in detail how the matrix-vector products are computed and why this works.
    Provide complexity analysis. Assume n, r < q ≪ N. Avoid any computation of order N.

    The solution must be rigorous: formal proofs, working implementation verified at
    multiple scales, and complexity claims backed by empirical benchmarks.
  task_type: "math_research"

target:
  topic: "Preconditioned CG for RKHS-constrained CP tensor decomposition"
