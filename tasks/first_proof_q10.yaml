# Forage Task Spec: First Proof Q10 (Kolda)
# Research-level math: Preconditioned CG for RKHS-constrained CP tensor decomposition
# Source: https://arxiv.org/abs/2602.05192 (Question 10, posed by Tammy Kolda)
#
# This is a constructive problem: design a method, not prove existence.
# The answer is verifiable: implement it, benchmark convergence, check complexity.

task:
  name: "first_proof_q10"
  description: |
    Solve Question 10 from the First Proof benchmark (Tammy Kolda).

    Given a d-way tensor T with missing entries, we compute a CP decomposition of rank r
    where some modes are infinite-dimensional and constrained to a Reproducing Kernel
    Hilbert Space (RKHS). The mode-k subproblem requires solving:

      [(Z ⊗ K)^T S S^T (Z ⊗ K) + λ(I_r ⊗ K)] vec(W) = (I_r ⊗ K) vec(B)

    This is a system of size nr × nr. Direct solve costs O(n³r³).

    Task: Design an efficient preconditioned conjugate gradient solver.
    Specifically: (1) choose a preconditioner, (2) explain how matrix-vector products
    are computed without forming the full matrix, (3) prove correctness,
    (4) provide complexity analysis showing improvement over O(n³r³),
    (5) implement and benchmark on synthetic data.

    Assume n, r ≪ q ≪ N where N = ∏ nᵢ. Avoid any computation of order N.

    IMPORTANT for Evaluator: eval.py must verify CORRECTNESS, not just presence.
    - Run the solver implementation on synthetic data and verify it converges
    - Check that convergence is faster than direct solve O(n³r³)
    - Validate benchmark results are numerically reasonable
    - A proof that only contains keywords but is logically wrong should score 0
  task_type: "math_research"

