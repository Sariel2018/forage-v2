# Forage Task Spec: Oil & Gold — Investor's Open-Ended Inquiry
# Phase 2 showcase — vague user request, long-horizon exploration

task:
  name: "oil_gold_geopolitics_2026"
  description: |
    一位资深投资人注意到 2026 年以来油价和金价波动频繁，但不确定哪些波动是
    真实由地缘/政策事件驱动，哪些是市场噪声。他希望你帮他梳理清楚全貌，并给
    他一份他能在周一早会上使用的研究报告（PDF）。

    报告需要足够严谨以经得起资深金融分析师的审视：每个 claim 有数据或引用
    支撑，区分真实关联与市场噪声，对结论给出置信度评估，承认分析的局限性。
  task_type: "multi_source_analysis"

target:
  topic: "Oil and gold price movements in 2026"
  time_range:
    start: "2026-01-01"
    end: "2026-04-14"
  doc_type: "investor research report (PDF)"
  language: "en"

coverage:
  target: 0.90
  mode: "soft"
  dimensions: []

quality:
  min_text_length: 0
  required_fields: []

budget:
  max_rounds: 8
  max_requests: 10000
  max_runtime_minutes: 480
  max_turns_per_agent: 50
  effort: "high"
  model: "claude-opus-4-6"

risk:
  respect_robots_txt: true
  max_requests_per_minute: 30

sources:
  seed_sources: []
  preferred_sources:
    - "finance.yahoo.com"
    - "reuters.com"
    - "bloomberg.com"
    - "ft.com"
    - "wsj.com"
