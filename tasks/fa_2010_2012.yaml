# Forage Task Spec: Foreign Affairs 2010-2012
# 付费墙文本语料，数字扩张期（web-exclusive 大量涌现）
# 难度：TOC 只覆盖印刷版 → CDX 通配符发现 web-exclusive → 分母跳变

task:
  name: "fa_2010_2012"
  description: "Collect all full-length Foreign Affairs articles and essays from 2010 to 2012"

target:
  topic: "Foreign Affairs magazine full-length articles and essays"
  time_range:
    start: "2010-01-01"
    end: "2012-12-31"
  doc_type: "article"
  language: "en"

coverage:
  mode: "soft"
  target: 0.90
  dimensions:
    - time
    - record

quality:
  min_text_length: 500
  required_fields:
    - title
    - full_text
    - date
  dedup: true

budget:
  max_rounds: 10
  max_requests: 5000
  max_runtime_minutes: 180

risk:
  respect_robots_txt: true
  max_requests_per_minute: 15
  forbidden_sources: []

sources:
  seed_sources:
    - "https://www.foreignaffairs.com"
  preferred_sources:
    - "https://web.archive.org"
  forbidden_sources: []
