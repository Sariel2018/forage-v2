# Forage Task Spec: First Proof Q6 (Spielman) — Sonnet model variant
# Same task as first_proof_q6.yaml, only difference is model: sonnet
# For Opus vs Sonnet comparison experiment

task:
  name: "first_proof_q6_sonnet"
  description: |
    Solve Question 6 from the First Proof benchmark (Daniel Spielman).

    For a graph G = (V, E), let G_S = (V, E(S, S)) denote the graph with the same
    vertex set, but only the edges between vertices in S. Let L be the Laplacian matrix
    of G and let L_S be the Laplacian of G_S.

    Say that a set of vertices S is ε-light if the matrix εL - L_S is positive semidefinite.

    Does there exist a constant c > 0 so that for every graph G and every ε between
    0 and 1, V contains an ε-light subset S of size at least c·ε·|V|?

    Either prove the statement or provide a counterexample. The solution must be rigorous:
    formal proofs with clear logical structure, computational evidence from testing on
    diverse graph families (random, regular, sparse, dense), and explicit construction
    of the set S or the counterexample.
  task_type: "math_research"

