# Forage Task Spec: Foreign Affairs 2008-2012
# 付费墙文本语料，跨数字化分水岭（2009）
# 难度：CDX+TOC 发现 → CDX 通配符补全 → capsule-review 过滤

task:
  name: "fa_2008_2012"
  description: "Collect all Foreign Affairs articles from 2008 to 2012"

target:
  topic: "Foreign Affairs magazine articles"
  time_range:
    start: "2008-01-01"
    end: "2012-12-31"
  doc_type: "article"
  language: "en"

coverage:
  mode: "soft"            # soft target: 付费墙数据允许未达标但需 gap report
  target: 0.90
  dimensions:
    - time                # 按月覆盖
    - record              # 文章篇数

quality:
  min_text_length: 200
  required_fields:
    - title
    - full_text
    - date
  dedup: true

budget:
  max_rounds: 10
  max_requests: 5000
  max_runtime_minutes: 180

risk:
  respect_robots_txt: true
  max_requests_per_minute: 15
  forbidden_sources: []

sources:
  seed_sources:
    - "https://www.foreignaffairs.com"
  preferred_sources:
    - "https://web.archive.org"
  forbidden_sources: []
